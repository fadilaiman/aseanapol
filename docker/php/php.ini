; Production-tuned PHP settings

; Error handling
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Performance
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Upload limits
upload_max_filesize = 20M
post_max_size = 20M

; OPcache — speeds up PHP, clear with: php artisan opcache:clear (or restart app container)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0       ; 0 = always check in dev, change to 60 in prod
opcache.save_comments = 1

; Timezone
date.timezone = Asia/Kuala_Lumpur
